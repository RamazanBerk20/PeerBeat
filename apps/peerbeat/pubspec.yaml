name: peerbeat
description: "Local-first music player with LAN peer-to-peer sharing"
publish_to: 'none'
version: 0.1.1+2

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  peerbeat_core:
    path: rust_builder
  flutter_rust_bridge: 2.12.0
  path_provider: ^2.1.5
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.16 # Android lockscreen/notification + background
  file_picker: ^10.3.7
  dbus: ^0.7.10 # MPRIS media-key/lockscreen integration on Linux
  crypto: ^3.0.7
  window_manager: ^0.4.3 # desktop close-to-tray (hide on close)
  tray_manager: ^0.3.2 # desktop system-tray icon + menu

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    # Bundled so the Linux GTK runner can set the window/taskbar icon from a file
    # (theme-name icons aren't available when running from the bundle).
    - assets/icon/app_icon.png

# Generated with: dart run flutter_launcher_icons   (from apps/peerbeat)
# Source image is the single project icon at repo-root assets/icon/PeerBeat.png.
flutter_launcher_icons:
  image_path: "../../assets/icon/PeerBeat.png"
  android: "ic_launcher"
  min_sdk_android: 26
  adaptive_icon_background: "#0C1226"
  adaptive_icon_foreground: "../../assets/icon/PeerBeat.png"
  windows:
    generate: true
    image_path: "../../assets/icon/PeerBeat.png"
    icon_size: 256
