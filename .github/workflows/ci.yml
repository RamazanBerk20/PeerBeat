name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: stable

jobs:
  rust:
    name: Rust core (fmt · clippy · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/peerbeat_core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/peerbeat_core
      # cpal needs ALSA headers on Linux
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  dart:
    name: Flutter (analyze · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run analyze
      - run: melos run format-check
      - run: melos run test

  build-linux:
    name: Build (Linux desktop, debug smoke)
    runs-on: ubuntu-latest
    needs: [rust, dart]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/peerbeat_core
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libasound2-dev
      - run: dart pub global activate melos && melos bootstrap
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux --debug
        working-directory: apps/peerbeat

  # Android build (Rust cross-compile via cargo-ndk) is heavier; runs on demand
  # and on tags until promoted to a per-PR check.
  build-android:
    name: Build (Android debug APK)
    runs-on: ubuntu-latest
    needs: [rust, dart]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/peerbeat_core
      - run: cargo install cargo-ndk --locked
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: dart pub global activate melos && melos bootstrap
      - run: flutter build apk --debug
        working-directory: apps/peerbeat
